<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — Page not found · Gizem Tuğuz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500;1,9..144,400&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --paper:#ECE6DA; --paper-2:#E4DDCE; --ink:#23201A; --muted:#6A655B;
        --accent:#2F6B4A; --line:rgba(35,32,26,.16); --line-strong:rgba(35,32,26,.30);
        --serif:"Fraunces",Georgia,serif; --sans:"Inter",system-ui,sans-serif;
        --mono:"IBM Plex Mono",ui-monospace,monospace;
      }
      @media (prefers-color-scheme: dark){
        :root{
          --paper:#141310; --paper-2:#1B1A15; --ink:#F2EEE4; --muted:#A29D90;
          --accent:#5FB286; --line:rgba(242,238,228,.16); --line-strong:rgba(242,238,228,.34);
        }
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;display:flex;align-items:center;justify-content:center;
        background:var(--paper);color:var(--ink);font-family:var(--sans);
        -webkit-font-smoothing:antialiased;padding:clamp(24px,6vw,72px);
      }
      .wrap{width:100%;max-width:760px}
      .eyebrow{display:flex;align-items:center;gap:18px;font-family:var(--mono);font-size:12.5px;
        letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
      .eyebrow .num{color:var(--accent)}
      .eyebrow .rule{flex:1;height:1px;background:var(--line)}
      .code{font-family:var(--serif);font-weight:500;font-size:clamp(96px,22vw,220px);
        line-height:.86;letter-spacing:-.03em;margin:0}
      .code em{font-style:italic;color:var(--accent)}
      .title{font-family:var(--serif);font-weight:500;font-size:clamp(24px,3.4vw,38px);
        letter-spacing:-.015em;margin:22px 0 14px}
      .note{color:var(--muted);font-size:17px;line-height:1.6;max-width:46ch;margin:0 0 40px}
      .actions{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
      .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;
        letter-spacing:.04em;text-transform:uppercase;text-decoration:none;
        background:var(--ink);color:var(--paper);padding:15px 24px;border:1px solid var(--ink);
        border-radius:2px;transition:.22s ease}
      .btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
      .link{font-family:var(--mono);font-size:13px;letter-spacing:.04em;text-transform:uppercase;
        color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line-strong);padding-bottom:3px;transition:.2s ease}
      .link:hover{color:var(--accent);border-color:var(--accent)}
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="eyebrow">
        <span class="num">ERR</span>
        <span class="rule"></span>
        <span>Page not found</span>
      </div>
      <h1 class="code">4<em>0</em>4</h1>
      <h2 class="title">This page took a wrong turn.</h2>
      <p class="note">
        The page you’re looking for doesn’t exist or may have moved. Let’s get you
        back to the work.
      </p>
      <div class="actions">
        <a class="btn" href="/">Back to home</a>
        <a class="link" href="/#projects">View selected work</a>
      </div>
    </main>
  </body>
</html>
